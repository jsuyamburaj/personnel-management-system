<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMS Login | Glass Theme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header i {
            font-size: 3rem;
            color: #4facfe;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
        }

        .login-header h2 {
            color: white;
            font-weight: 600;
            margin-top: 1rem;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            color: white;
            padding: 12px 16px;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.3);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .btn-login {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            color: white;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }

        .text-muted-custom {
            color: rgba(255, 255, 255, 0.6);
        }

        .alert-glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: none;
            color: white;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="login-header">
            <i class="fas fa-cloud-upload-alt"></i>
            <h2>SPMS Login</h2>
            <p>Software Personnel Management System</p>
        </div>
        <div id="alertBox"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="admin@spms.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Demo Role</label>
                <select class="form-select" id="roleSelect">
                    <option value="admin">Admin</option>
                    <option value="manager">Manager</option>
                    <option value="developer">Developer</option>
                    <option value="hr">HR</option>
                    <option value="employee">Employee</option>
                </select>
                <small class="text-muted-custom">Demo: any email + password "password123"</small>
            </div>
            <button type="submit" class="btn-login mt-3">Login <i class="fas fa-arrow-right ms-2"></i></button>
        </form>
        <div class="text-center mt-4">
            <small class="text-muted-custom">Demo accounts: admin@spms.com, manager@spms.com, hr@spms.com</small>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('roleSelect').value;
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('role', data.user.role);
                    window.location.href = data.user.role === 'admin' ? 'admin-dashboard.html' : 'employee-dashboard.html';
                } else {
                    showAlert('Invalid credentials. Use password: password123', 'danger');
                }
            } catch (err) {
                showAlert('Backend not running? Start FastAPI server on port 8000', 'danger');
            }
        });
        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.innerHTML = `<div class="alert alert-glass alert-dismissible fade show" role="alert">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
            setTimeout(() => box.innerHTML = '', 3000);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
