<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - Kanban | Glass Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            line-height: 1.5;
        }

        /* Header with Logout */
        .header-with-logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logout-btn {
            background: rgba(245, 101, 101, 0.2);
            border: 1px solid rgba(245, 101, 101, 0.5);
            border-radius: 40px;
            padding: 10px 24px;
            color: #f56565;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: rgba(245, 101, 101, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 101, 101, 0.3);
        }

        h2 {
            color: white;
            font-weight: 600;
            margin-bottom: 0;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Kanban Board */
        .kanban-board {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding: 10px 0 20px;
            min-height: 550px;
        }

        /* Kanban Column - Glass */
        .kanban-column {
            flex: 1;
            min-width: 320px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s;
        }

        .kanban-column:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .kanban-header {
            font-weight: 600;
            padding-bottom: 12px;
            margin-bottom: 16px;
            border-bottom: 2px solid rgba(79, 172, 254, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 1rem;
        }

        .kanban-header span:first-child {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .column-badge {
            background: rgba(79, 172, 254, 0.3);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #4facfe;
        }

        /* Task Card - Improved Styling */
        .task-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: grab;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.12);
            position: relative;
        }

        .task-card:active {
            cursor: grabbing;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(79, 172, 254, 0.3);
        }

        .task-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        /* Task Title */
        .task-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        /* Task Description */
        .task-description {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        /* Priority Badges - Improved */
        .task-priority {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .priority-high { 
            background: rgba(220, 38, 38, 0.2); 
            color: #f56565; 
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        .priority-medium { 
            background: rgba(237, 137, 54, 0.2); 
            color: #ed8936; 
            border: 1px solid rgba(237, 137, 54, 0.3);
        }
        .priority-low { 
            background: rgba(72, 187, 120, 0.2); 
            color: #48bb78; 
            border: 1px solid rgba(72, 187, 120, 0.3);
        }

        /* Task Meta Info */
        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .task-assignee {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .task-assignee i {
            font-size: 0.65rem;
            color: #4facfe;
        }

        .task-due {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-due.overdue {
            color: #f56565;
        }

        /* Task Actions Dropdown */
        .task-actions {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        .task-actions .dropdown-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .task-actions .dropdown-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Add Task Button */
        .add-task-btn {
            width: 100%;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px dashed rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            padding: 10px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .add-task-btn:hover {
            background: rgba(79, 172, 254, 0.2);
            border-color: #4facfe;
            color: white;
            transform: translateY(-2px);
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .bg-secondary {
            background: rgba(79, 172, 254, 0.3);
            color: #4facfe;
        }

        /* Modal Styles - Glass */
        .modal-content {
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            color: white;
        }

        .modal-header {
            border-bottom: 1px solid rgba(79, 172, 254, 0.3);
            padding: 1.2rem 1.5rem;
        }

        .modal-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
        }

        .modal-title {
            color: white;
        }

        .btn-close {
            filter: invert(1);
        }

        /* Form Controls */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            padding: 10px 16px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
            color: white;
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Dropdown Menu */
        .dropdown-menu {
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
        }

        .dropdown-item {
            color: white;
            transition: all 0.3s;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: rgba(79, 172, 254, 0.3);
            color: white;
        }

        .dropdown-item.text-danger:hover {
            background: rgba(245, 101, 101, 0.3);
        }

        /* Utility Classes */
        .d-flex {
            display: flex;
        }

        .justify-content-between {
            justify-content: space-between;
        }

        .align-items-center {
            align-items: center;
        }

        .align-items-start {
            align-items: flex-start;
        }

        .mb-1 {
            margin-bottom: 0.25rem;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-3 {
            margin-bottom: 1rem;
        }

        .mb-4 {
            margin-bottom: 1.5rem;
        }

        .me-1 {
            margin-right: 0.25rem;
        }

        .me-2 {
            margin-right: 0.5rem;
        }

        .ms-2 {
            margin-left: 0.5rem;
        }

        .mt-2 {
            margin-top: 0.5rem;
        }

        .text-muted {
            color: rgba(255, 255, 255, 0.6) !important;
        }

        .small {
            font-size: 0.75rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4facfe;
            border-radius: 10px;
        }

        /* Toast Notification */
        .toast-glass {
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 16px;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kanban-board {
                flex-direction: column;
            }
            
            .kanban-column {
                min-width: 100%;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .header-with-logout {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div>
        <!-- Header with Logout Button -->
        <div class="header-with-logout">
            <h2><i class="fas fa-tasks me-2"></i> Task Management</h2>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </button>
        </div>
        
        <!-- New Task Button Row -->
        <div class="d-flex justify-content-end mb-4">
            <button class="btn-primary" data-bs-toggle="modal" data-bs-target="#taskModal" onclick="openAddTaskModal()">
                <i class="fas fa-plus me-2"></i> New Task
            </button>
        </div>
        
        <!-- Kanban Board -->
        <div class="kanban-board" id="kanbanBoard">
            <!-- Columns will be populated here -->
        </div>
    </div>
    
    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskModalTitle">
                        <i class="fas fa-plus-circle me-2"></i> Add Task
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <input type="hidden" id="taskId">
                        <div class="mb-3">
                            <label class="form-label">Task Title</label>
                            <input type="text" class="form-control" id="taskTitle" required placeholder="Enter task title">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="taskDesc" rows="3" placeholder="Task description..."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Priority</label>
                                <select class="form-select" id="taskPriority">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Assignee</label>
                                <select class="form-select" id="taskAssignee">
                                    <option value="John Doe">John Doe</option>
                                    <option value="Jane Smith">Jane Smith</option>
                                    <option value="Mike Johnson">Mike Johnson</option>
                                    <option value="Sarah Williams">Sarah Williams</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Due Date</label>
                                <input type="date" class="form-control" id="taskDueDate">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Project</label>
                                <select class="form-select" id="taskProject">
                                    <option>Website Redesign</option>
                                    <option>Mobile App</option>
                                    <option>API Development</option>
                                    <option>Database Migration</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="taskStatus">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-primary" onclick="saveTask()">
                        <i class="fas fa-save me-2"></i> Save Task
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        let tasks = [
            { id: 1, title: 'Design Homepage', description: 'Create responsive homepage design with modern UI', priority: 'High', status: 'Pending', assignee: 'John Doe', dueDate: '2024-12-20', project: 'Website Redesign' },
            { id: 2, title: 'API Integration', description: 'Integrate REST APIs for data fetching', priority: 'High', status: 'In Progress', assignee: 'Jane Smith', dueDate: '2024-12-18', project: 'Mobile App' },
            { id: 3, title: 'Write Documentation', description: 'API documentation for developers', priority: 'Low', status: 'Pending', assignee: 'Mike Johnson', dueDate: '2024-12-25', project: 'API Development' },
            { id: 4, title: 'Unit Testing', description: 'Write unit tests for all modules', priority: 'Medium', status: 'In Progress', assignee: 'Sarah Williams', dueDate: '2024-12-22', project: 'API Development' },
            { id: 5, title: 'Deploy to Production', description: 'Deploy final build to production server', priority: 'High', status: 'Completed', assignee: 'John Doe', dueDate: '2024-12-15', project: 'Website Redesign' }
        ];
        
        const columns = ['Pending', 'In Progress', 'Completed'];
        let draggedItem = null;
        
        function renderKanban() {
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = columns.map(status => {
                const statusTasks = tasks.filter(t => t.status === status);
                const icon = status === 'Pending' ? 'fa-clock' : status === 'In Progress' ? 'fa-spinner fa-pulse' : 'fa-check-circle';
                return `
                    <div class="kanban-column" data-status="${status}">
                        <div class="kanban-header">
                            <span>
                                <i class="fas ${icon} me-2"></i>
                                ${status}
                            </span>
                            <span class="column-badge">${statusTasks.length}</span>
                        </div>
                        <div class="tasks-container" id="tasks-${status.replace(/\s/g, '')}">
                            ${statusTasks.map(task => {
                                const isOverdue = new Date(task.dueDate) < new Date() && task.status !== 'Completed';
                                const priorityIcon = task.priority === 'High' ? 'fa-arrow-up' : task.priority === 'Medium' ? 'fa-minus' : 'fa-arrow-down';
                                return `
                                    <div class="task-card" draggable="true" data-task-id="${task.id}" ondragstart="dragStart(event)" ondragend="dragEnd(event)">
                                        <div class="task-actions">
                                            <div class="dropdown">
                                                <button class="dropdown-toggle" data-bs-toggle="dropdown">
                                                    <i class="fas fa-ellipsis-v"></i>
                                                </button>
                                                <ul class="dropdown-menu dropdown-menu-end">
                                                    <li><a class="dropdown-item" href="#" onclick="editTask(${task.id})"><i class="fas fa-edit me-2"></i>Edit</a></li>
                                                    <li><hr class="dropdown-divider"></li>
                                                    <li><a class="dropdown-item text-danger" href="#" onclick="deleteTask(${task.id})"><i class="fas fa-trash me-2"></i>Delete</a></li>
                                                </ul>
                                            </div>
                                        </div>
                                        <div class="task-title">${escapeHtml(task.title)}</div>
                                        <div class="task-description">${escapeHtml(task.description.substring(0, 80))}${task.description.length > 80 ? '...' : ''}</div>
                                        <div class="task-meta">
                                            <span class="task-priority priority-${task.priority.toLowerCase()}">
                                                <i class="fas ${priorityIcon} me-1"></i> ${task.priority}
                                            </span>
                                            <div class="task-assignee">
                                                <i class="fas fa-user-circle"></i>
                                                <span>${task.assignee}</span>
                                            </div>
                                        </div>
                                        <div class="task-due ${isOverdue ? 'overdue' : ''}">
                                            <i class="fas fa-calendar-alt"></i>
                                            <span>Due: ${task.dueDate}</span>
                                            ${isOverdue ? '<span class="ms-2">⚠️ Overdue</span>' : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <button class="add-task-btn" onclick="openAddTaskWithStatus('${status}')">
                            <i class="fas fa-plus"></i> Add Task
                        </button>
                    </div>
                `;
            }).join('');
            
            // Add drag and drop listeners
            document.querySelectorAll('.tasks-container').forEach(container => {
                container.addEventListener('dragover', dragOver);
                container.addEventListener('drop', drop);
            });
        }
        
        function dragStart(event) {
            draggedItem = event.target.closest('.task-card');
            if (draggedItem) {
                event.dataTransfer.setData('text/plain', draggedItem.dataset.taskId);
                draggedItem.style.opacity = '0.5';
                draggedItem.classList.add('dragging');
            }
        }
        
        function dragEnd(event) {
            if (draggedItem) {
                draggedItem.style.opacity = '';
                draggedItem.classList.remove('dragging');
            }
            draggedItem = null;
        }
        
        function dragOver(event) {
            event.preventDefault();
        }
        
        function drop(event) {
            event.preventDefault();
            const targetColumn = event.target.closest('.kanban-column');
            if (!targetColumn || !draggedItem) return;
            
            const newStatus = targetColumn.dataset.status;
            const taskId = parseInt(event.dataTransfer.getData('text/plain'));
            const task = tasks.find(t => t.id === taskId);
            
            if (task && task.status !== newStatus) {
                task.status = newStatus;
                renderKanban();
                showToast(`Task "${task.title}" moved to ${newStatus}`, 'success');
            }
        }
        
        function openAddTaskModal() {
            document.getElementById('taskModalTitle').innerHTML = '<i class="fas fa-plus-circle me-2"></i> Add Task';
            document.getElementById('taskForm').reset();
            document.getElementById('taskId').value = '';
            document.getElementById('taskDueDate').value = new Date().toISOString().split('T')[0];
            new bootstrap.Modal(document.getElementById('taskModal')).show();
        }
        
        function openAddTaskWithStatus(status) {
            openAddTaskModal();
            document.getElementById('taskStatus').value = status;
        }
        
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('taskModalTitle').innerHTML = '<i class="fas fa-edit me-2"></i> Edit Task';
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDesc').value = task.description;
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('taskAssignee').value = task.assignee;
                document.getElementById('taskDueDate').value = task.dueDate;
                document.getElementById('taskProject').value = task.project;
                document.getElementById('taskStatus').value = task.status;
                new bootstrap.Modal(document.getElementById('taskModal')).show();
            }
        }
        
        function saveTask() {
            const id = document.getElementById('taskId').value;
            const task = {
                id: id ? parseInt(id) : tasks.length + 1,
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDesc').value || 'No description',
                priority: document.getElementById('taskPriority').value,
                assignee: document.getElementById('taskAssignee').value,
                dueDate: document.getElementById('taskDueDate').value,
                project: document.getElementById('taskProject').value,
                status: document.getElementById('taskStatus').value
            };
            
            if (!task.title) {
                showToast('Please enter a task title', 'error');
                return;
            }
            
            if (id) {
                const index = tasks.findIndex(t => t.id === parseInt(id));
                if (index !== -1) tasks[index] = task;
            } else {
                tasks.push(task);
            }
            
            bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
            renderKanban();
            showToast('Task saved successfully!', 'success');
        }
        
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                renderKanban();
                showToast('Task deleted successfully!', 'success');
            }
        }
        
        function showToast(message, type) {
            const toastDiv = document.createElement('div');
            toastDiv.className = 'position-fixed bottom-0 end-0 p-3';
            toastDiv.style.zIndex = '9999';
            toastDiv.innerHTML = `
                <div class="toast-glass toast align-items-center show" role="alert" style="min-width: 300px;">
                    <div class="d-flex">
                        <div class="toast-body">
                            <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2" style="color: ${type === 'success' ? '#48bb78' : '#f56565'}"></i>
                            ${message}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            document.body.appendChild(toastDiv);
            setTimeout(() => toastDiv.remove(), 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Initialize kanban board
        renderKanban();
    </script>
</body>
</html>
