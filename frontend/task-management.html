<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - Kanban</title>
    <style>
        .kanban-board {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 10px 0;
            min-height: 500px;
        }
        .kanban-column {
            flex: 1;
            min-width: 300px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
        }
        .kanban-header {
            font-weight: 600;
            padding-bottom: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #dee2e6;
            display: flex;
            justify-content: space-between;
        }
        .task-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: grab;
            transition: all 0.2s;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .task-priority {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .priority-high { background: #fee2e2; color: #dc2626; }
        .priority-medium { background: #fef3c7; color: #d97706; }
        .priority-low { background: #dcfce7; color: #16a34a; }
        .add-task-btn {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Task Management</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#taskModal" onclick="openAddTaskModal()">
                <i class="fas fa-plus"></i> New Task
            </button>
        </div>
        
        <!-- Kanban Board -->
        <div class="kanban-board" id="kanbanBoard">
            <!-- Columns will be populated here -->
        </div>
    </div>
    
    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskModalTitle">Add Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <input type="hidden" id="taskId">
                        <div class="mb-3">
                            <label>Task Title</label>
                            <input type="text" class="form-control" id="taskTitle" required>
                        </div>
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea class="form-control" id="taskDesc" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Priority</label>
                                <select class="form-select" id="taskPriority">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Assignee</label>
                                <select class="form-select" id="taskAssignee">
                                    <option value="John Doe">John Doe</option>
                                    <option value="Jane Smith">Jane Smith</option>
                                    <option value="Mike Johnson">Mike Johnson</option>
                                    <option value="Sarah Williams">Sarah Williams</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Due Date</label>
                                <input type="date" class="form-control" id="taskDueDate">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Project</label>
                                <select class="form-select" id="taskProject">
                                    <option>Website Redesign</option>
                                    <option>Mobile App</option>
                                    <option>API Development</option>
                                    <option>Database Migration</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Status</label>
                            <select class="form-select" id="taskStatus">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveTask()">Save Task</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let tasks = [
            { id: 1, title: 'Design Homepage', description: 'Create responsive homepage design', priority: 'High', status: 'Pending', assignee: 'John Doe', dueDate: '2024-12-20', project: 'Website Redesign' },
            { id: 2, title: 'API Integration', description: 'Integrate REST APIs', priority: 'High', status: 'In Progress', assignee: 'Jane Smith', dueDate: '2024-12-18', project: 'Mobile App' },
            { id: 3, title: 'Write Documentation', description: 'API documentation', priority: 'Low', status: 'Pending', assignee: 'Mike Johnson', dueDate: '2024-12-25', project: 'API Development' },
            { id: 4, title: 'Unit Testing', description: 'Write unit tests for modules', priority: 'Medium', status: 'In Progress', assignee: 'Sarah Williams', dueDate: '2024-12-22', project: 'API Development' },
            { id: 5, title: 'Deploy to Production', description: 'Deploy final build', priority: 'High', status: 'Completed', assignee: 'John Doe', dueDate: '2024-12-15', project: 'Website Redesign' }
        ];
        
        const columns = ['Pending', 'In Progress', 'Completed'];
        
        function renderKanban() {
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = columns.map(status => `
                <div class="kanban-column" data-status="${status}">
                    <div class="kanban-header">
                        <span>${status}</span>
                        <span class="badge bg-secondary">${tasks.filter(t => t.status === status).length}</span>
                    </div>
                    <div class="tasks-container" id="tasks-${status.replace(/\s/g, '')}">
                        ${tasks.filter(task => task.status === status).map(task => `
                            <div class="task-card" draggable="true" data-task-id="${task.id}" ondragstart="dragStart(event)" ondragend="dragEnd(event)">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <strong>${task.title}</strong>
                                    <div class="dropdown">
                                        <button class="btn btn-sm btn-link" data-bs-toggle="dropdown"><i class="fas fa-ellipsis-v"></i></button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#" onclick="editTask(${task.id})">Edit</a></li>
                                            <li><a class="dropdown-item text-danger" href="#" onclick="deleteTask(${task.id})">Delete</a></li>
                                        </ul>
                                    </div>
                                </div>
                                <p class="small text-muted mb-2">${task.description.substring(0, 60)}...</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="task-priority priority-${task.priority.toLowerCase()}">${task.priority}</span>
                                    <small><i class="fas fa-user"></i> ${task.assignee}</small>
                                </div>
                                <small class="text-muted"><i class="fas fa-calendar"></i> Due: ${task.dueDate}</small>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-outline-secondary btn-sm add-task-btn" onclick="openAddTaskWithStatus('${status}')">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>
            `).join('');
            
            // Add drag and drop listeners
            document.querySelectorAll('.tasks-container').forEach(container => {
                container.addEventListener('dragover', dragOver);
                container.addEventListener('drop', drop);
            });
        }
        
        let draggedItem = null;
        
        function dragStart(event) {
            draggedItem = event.target.closest('.task-card');
            event.dataTransfer.setData('text/plain', draggedItem.dataset.taskId);
            draggedItem.style.opacity = '0.5';
        }
        
        function dragEnd(event) {
            if (draggedItem) draggedItem.style.opacity = '';
            draggedItem = null;
        }
        
        function dragOver(event) {
            event.preventDefault();
        }
        
        function drop(event) {
            event.preventDefault();
            const targetColumn = event.target.closest('.kanban-column');
            if (!targetColumn) return;
            
            const newStatus = targetColumn.dataset.status;
            const taskId = parseInt(event.dataTransfer.getData('text/plain'));
            const task = tasks.find(t => t.id === taskId);
            
            if (task && task.status !== newStatus) {
                task.status = newStatus;
                renderKanban();
                showToast(`Task moved to ${newStatus}`, 'info');
            }
        }
        
        function openAddTaskModal() {
            document.getElementById('taskModalTitle').innerText = 'Add Task';
            document.getElementById('taskForm').reset();
            document.getElementById('taskId').value = '';
            new bootstrap.Modal(document.getElementById('taskModal')).show();
        }
        
        function openAddTaskWithStatus(status) {
            openAddTaskModal();
            document.getElementById('taskStatus').value = status;
        }
        
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('taskModalTitle').innerText = 'Edit Task';
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDesc').value = task.description;
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('taskAssignee').value = task.assignee;
                document.getElementById('taskDueDate').value = task.dueDate;
                document.getElementById('taskProject').value = task.project;
                document.getElementById('taskStatus').value = task.status;
                new bootstrap.Modal(document.getElementById('taskModal')).show();
            }
        }
        
        function saveTask() {
            const id = document.getElementById('taskId').value;
            const task = {
                id: id ? parseInt(id) : tasks.length + 1,
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDesc').value,
                priority: document.getElementById('taskPriority').value,
                assignee: document.getElementById('taskAssignee').value,
                dueDate: document.getElementById('taskDueDate').value,
                project: document.getElementById('taskProject').value,
                status: document.getElementById('taskStatus').value
            };
            
            if (id) {
                const index = tasks.findIndex(t => t.id === parseInt(id));
                if (index !== -1) tasks[index] = task;
            } else {
                tasks.push(task);
            }
            
            bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
            renderKanban();
            showToast('Task saved successfully!', 'success');
        }
        
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                renderKanban();
                showToast('Task deleted!', 'success');
            }
        }
        
        function showToast(message, type) {
            const toastHtml = `
                <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
                    <div class="toast align-items-center text-white bg-${type} border-0" role="alert">
                        <div class="d-flex">
                            <div class="toast-body">${message}</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', toastHtml);
            const toastEl = document.querySelector('.toast:last-child');
            const toast = new bootstrap.Toast(toastEl, { autohide: true, delay: 3000 });
            toast.show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        }
        
        renderKanban();
    </script>
</body>
</html>
