<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs | Blue Glass Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
        }

        .header-with-logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 40px;
            padding: 8px 20px;
            color: #dc2626;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-1px);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0;
        }

        /* Modern Glass Card */
        .dashboard-widget {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .dashboard-widget:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* Form Controls */
        .form-control, .form-select {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: #0f172a;
            padding: 10px 14px;
            transition: all 0.3s;
            width: 100%;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-label {
            color: #334155;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        /* Button */
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .table thead th {
            border-bottom: 2px solid #e2e8f0;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #64748b;
        }

        .table tbody td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            color: #334155;
        }

        .table tbody tr:hover {
            background: #f8fafc;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .badge-secondary {
            background: #dbeafe;
            color: #3b82f6;
        }

        /* Grid */
        .row {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -12px;
        }

        .col-md-3 {
            padding: 0 12px;
            flex: 0 0 25%;
            max-width: 25%;
        }

        @media (max-width: 768px) {
            .col-md-3 {
                flex: 0 0 100%;
                max-width: 100%;
                margin-bottom: 12px;
            }
            .header-with-logout {
                flex-direction: column;
                align-items: flex-start;
            }
            .dashboard-widget {
                padding: 20px;
            }
        }

        /* Utility Classes */
        .text-center { text-align: center; }
        .mb-4 { margin-bottom: 20px; }
        .mt-2 { margin-top: 8px; }
        .me-2 { margin-right: 8px; }
        .w-100 { width: 100%; }
        .text-muted { color: #64748b !important; }
        .text-danger { color: #dc2626 !important; }

        /* Loading Spinner */
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div>
        <div class="header-with-logout">
            <h2>📜 Activity Logs</h2>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
        
        <div class="dashboard-widget">
            <div class="row">
                <div class="col-md-3">
                    <label class="form-label">Action Type</label>
                    <select class="form-select" id="actionFilter">
                        <option value="">All Actions</option>
                        <option value="login">🔑 Login</option>
                        <option value="create_employee">👤 Create Employee</option>
                        <option value="update_task">✏️ Update Task</option>
                        <option value="check_in">✅ Check In</option>
                        <option value="check_out">🚪 Check Out</option>
                        <option value="create_project">📁 Create Project</option>
                        <option value="delete_employee">🗑️ Delete Employee</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">From Date</label>
                    <input type="date" class="form-control" id="fromDate">
                </div>
                <div class="col-md-3">
                    <label class="form-label">To Date</label>
                    <input type="date" class="form-control" id="toDate">
                </div>
                <div class="col-md-3">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn-primary w-100" onclick="loadActivityLogs()">
                        🔍 Filter Logs
                    </button>
                </div>
            </div>
        </div>
        
        <div class="dashboard-widget">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>👤 User</th>
                            <th>🏷️ Action</th>
                            <th>📝 Details</th>
                            <th>⏰ Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="logsTable">
                        <tr>
                            <td colspan="4" class="text-center">
                                <div class="loading-spinner"></div>
                                <p class="mt-2 text-muted">Loading activity logs...</p>
                            </td
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        async function loadActivityLogs() {
            const action = document.getElementById('actionFilter').value;
            const from = document.getElementById('fromDate').value;
            const to = document.getElementById('toDate').value;
            
            let url = 'http://localhost:8000/api/activity-logs/me?limit=100';
            if (action) url += `&action=${action}`;
            if (from) url += `&from_date=${from}`;
            if (to) url += `&to_date=${to}`;
            
            const tbody = document.getElementById('logsTable');
            tbody.innerHTML = '<td><td colspan="4" class="text-center"><div class="loading-spinner"></div><p class="mt-2 text-muted">Loading...</p></tr';
            
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (response.ok) {
                    const logs = await response.json();
                    
                    if (logs.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="4" class="text-center">
                                    <span style="font-size: 2rem;">📭</span>
                                    <p class="text-muted">No activity logs found</p>
                                </td
                            </tr>
                        `;
                        return;
                    }
                    
                    const groupedLogs = logs.reduce((acc, log) => {
                        const date = new Date(log.timestamp).toLocaleDateString();
                        if (!acc[date]) acc[date] = [];
                        acc[date].push(log);
                        return acc;
                    }, {});
                    
                    let html = '';
                    for (const [date, dateLogs] of Object.entries(groupedLogs)) {
                        html += `<tr style="background: #f8fafc;"><td colspan="4" style="font-weight: 600; padding: 12px;">📅 ${date}</td></tr>`;
                        
                        dateLogs.forEach(log => {
                            let actionIcon = '🔔';
                            let actionText = log.action.replace(/_/g, ' ');
                            
                            switch(log.action) {
                                case 'login': actionIcon = '🔑'; break;
                                case 'check_in': actionIcon = '✅'; break;
                                case 'check_out': actionIcon = '🚪'; break;
                                case 'create_employee': actionIcon = '👤'; break;
                                case 'delete_employee': actionIcon = '🗑️'; break;
                                case 'update_task': actionIcon = '✏️'; break;
                                case 'create_project': actionIcon = '📁'; break;
                                default: actionIcon = '🔔';
                            }
                            
                            html += `
                                <tr>
                                    <td>👤 ${log.user_email}</td
                                    <td><span class="badge badge-secondary">${actionIcon} ${actionText}</span></td
                                    <td>${log.details || 'No details'}</td
                                    <td>⏰ ${new Date(log.timestamp).toLocaleString()}</td
                                </tr>
                            `;
                        });
                    }
                    
                    tbody.innerHTML = html;
                } else {
                    throw new Error('Failed to fetch logs');
                }
            } catch (error) {
                console.error('Error loading logs:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="text-center">
                            <span style="font-size: 2rem;">❌</span>
                            <p class="text-danger">Failed to load activity logs</p>
                            <small class="text-muted">Please check if the backend server is running</small>
                        </td
                    </tr>
                `;
            }
        }
        
        document.getElementById('fromDate')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadActivityLogs();
        });
        
        document.getElementById('toDate')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadActivityLogs();
        });
        
        loadActivityLogs();
    </script>
</body>
</html>
