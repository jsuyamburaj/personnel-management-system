<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs | Glass Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        /* Header with Logout */
        .header-with-logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logout-btn {
            background: rgba(245, 101, 101, 0.2);
            border: 1px solid rgba(245, 101, 101, 0.5);
            border-radius: 40px;
            padding: 10px 24px;
            color: #f56565;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .logout-btn:hover {
            background: rgba(245, 101, 101, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 101, 101, 0.3);
        }
        
        /* Glass Widget */
        .dashboard-widget {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .dashboard-widget:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        h2 {
            color: white;
            font-weight: 600;
            margin-bottom: 0;
            background: linear-gradient(135deg, #fff, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Form Controls */
        .form-label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            color: white;
            padding: 10px 16px;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.3);
            color: white;
            outline: none;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }
        
        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
        }
        
        .table {
            color: white;
            margin-bottom: 0;
        }
        
        .table thead th {
            border-bottom: 2px solid rgba(79, 172, 254, 0.5);
            color: #4facfe;
            font-weight: 600;
            padding: 12px;
        }
        
        .table tbody td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }
        
        .table tbody tr:hover {
            background: rgba(79, 172, 254, 0.1);
        }
        
        /* Badge Styles */
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .bg-secondary {
            background: rgba(79, 172, 254, 0.3) !important;
            color: #4facfe;
        }
        
        /* Text Colors */
        .text-center {
            text-align: center;
        }
        
        .text-muted {
            color: rgba(255, 255, 255, 0.6) !important;
        }
        
        .text-danger {
            color: #f56565 !important;
        }
        
        /* Grid System */
        .row {
            display: flex;
            flex-wrap: wrap;
            margin-right: -0.75rem;
            margin-left: -0.75rem;
        }
        
        .col-md-3 {
            flex: 0 0 auto;
            width: 25%;
            padding-right: 0.75rem;
            padding-left: 0.75rem;
        }
        
        .mb-4 {
            margin-bottom: 1.5rem;
        }
        
        .mt-3 {
            margin-top: 1rem;
        }
        
        .w-100 {
            width: 100%;
        }
        
        .me-2 {
            margin-right: 0.5rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-widget {
                padding: 1rem;
            }
            
            .col-md-3 {
                width: 100%;
                margin-bottom: 1rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .header-with-logout {
                flex-direction: column;
                align-items: flex-start;
            }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #4facfe;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #00f2fe;
        }
        
        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(79, 172, 254, 0.3);
            border-radius: 50%;
            border-top-color: #4facfe;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Filter Row Gap */
        .gap-3 {
            gap: 1rem;
        }
    </style>
</head>
<body>
    <div>
        <!-- Header with Logout Button -->
        <div class="header-with-logout">
            <h2><i class="fas fa-history me-2"></i> Activity Logs</h2>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </button>
        </div>
        
        <!-- Filters -->
        <div class="dashboard-widget mb-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Action Type</label>
                    <select class="form-select" id="actionFilter">
                        <option value="">All Actions</option>
                        <option value="login">Login</option>
                        <option value="create_employee">Create Employee</option>
                        <option value="update_task">Update Task</option>
                        <option value="check_in">Check In</option>
                        <option value="check_out">Check Out</option>
                        <option value="create_project">Create Project</option>
                        <option value="delete_employee">Delete Employee</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">From Date</label>
                    <input type="date" class="form-control" id="fromDate">
                </div>
                <div class="col-md-3">
                    <label class="form-label">To Date</label>
                    <input type="date" class="form-control" id="toDate">
                </div>
                <div class="col-md-3">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn-primary w-100" onclick="loadActivityLogs()">
                        <i class="fas fa-search me-2"></i> Filter Logs
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Logs Table -->
        <div class="dashboard-widget">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th><i class="fas fa-user me-1"></i> User</th>
                            <th><i class="fas fa-tag me-1"></i> Action</th>
                            <th><i class="fas fa-info-circle me-1"></i> Details</th>
                            <th><i class="fas fa-clock me-1"></i> Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="logsTable">
                        <tr>
                            <td colspan="4" class="text-center">
                                <div class="loading-spinner"></div>
                                <p class="mt-2 text-muted">Loading activity logs...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        async function loadActivityLogs() {
            const action = document.getElementById('actionFilter').value;
            const from = document.getElementById('fromDate').value;
            const to = document.getElementById('toDate').value;
            
            let url = 'http://localhost:8000/api/activity-logs/me?limit=100';
            if (action) url += `&action=${action}`;
            if (from) url += `&from_date=${from}`;
            if (to) url += `&to_date=${to}`;
            
            const tbody = document.getElementById('logsTable');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center"><div class="loading-spinner"></div><p class="mt-2 text-muted">Loading...</p></td></tr>';
            
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (response.ok) {
                    const logs = await response.json();
                    
                    if (logs.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="4" class="text-center">
                                    <i class="fas fa-inbox fa-2x text-muted mb-2 d-block"></i>
                                    <p class="text-muted">No activity logs found</p>
                                 </td>
                             </tr>
                        `;
                        return;
                    }
                    
                    // Group logs by date for better readability
                    const groupedLogs = logs.reduce((acc, log) => {
                        const date = new Date(log.timestamp).toLocaleDateString();
                        if (!acc[date]) acc[date] = [];
                        acc[date].push(log);
                        return acc;
                    }, {});
                    
                    let html = '';
                    for (const [date, dateLogs] of Object.entries(groupedLogs)) {
                        html += `<tr style="background: rgba(79, 172, 254, 0.1);">
                                    <td colspan="4" style="font-weight: 600;">
                                        <i class="fas fa-calendar-day me-2"></i> ${date}
                                    </td>
                                </tr>`;
                        
                        dateLogs.forEach(log => {
                            // Get icon based on action
                            let actionIcon = 'fa-circle-info';
                            let actionColor = '#4facfe';
                            
                            switch(log.action) {
                                case 'login': actionIcon = 'fa-sign-in-alt'; actionColor = '#48bb78'; break;
                                case 'check_in': actionIcon = 'fa-clock'; actionColor = '#48bb78'; break;
                                case 'check_out': actionIcon = 'fa-clock'; actionColor = '#ed8936'; break;
                                case 'create_employee': actionIcon = 'fa-user-plus'; actionColor = '#48bb78'; break;
                                case 'delete_employee': actionIcon = 'fa-user-minus'; actionColor = '#f56565'; break;
                                case 'update_task': actionIcon = 'fa-edit'; actionColor = '#4299e1'; break;
                                case 'create_project': actionIcon = 'fa-project-diagram'; actionColor = '#48bb78'; break;
                                default: actionIcon = 'fa-circle-info'; actionColor = '#4facfe';
                            }
                            
                            html += `
                                <tr>
                                    <td>
                                        <i class="fas fa-user-circle me-2" style="color: #4facfe;"></i>
                                        ${log.user_email}
                                    </td>
                                    <td>
                                        <span class="badge bg-secondary">
                                            <i class="fas ${actionIcon} me-1"></i> ${log.action.replace(/_/g, ' ')}
                                        </span>
                                    </td>
                                    <td>${log.details || 'No details'}</td>
                                    <td>
                                        <i class="far fa-clock me-1"></i>
                                        ${new Date(log.timestamp).toLocaleTimeString()}
                                    </td>
                                </tr>
                            `;
                        });
                    }
                    
                    tbody.innerHTML = html;
                } else {
                    throw new Error('Failed to fetch logs');
                }
            } catch (error) {
                console.error('Error loading logs:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="text-center">
                            <i class="fas fa-exclamation-triangle fa-2x text-danger mb-2 d-block"></i>
                            <p class="text-danger">Failed to load activity logs</p>
                            <small class="text-muted">Please check if the backend server is running</small>
                        </td>
                    </tr>
                `;
            }
        }
        
        // Add event listeners for Enter key on date inputs
        document.getElementById('fromDate')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadActivityLogs();
        });
        
        document.getElementById('toDate')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadActivityLogs();
        });
        
        // Load logs on page load
        loadActivityLogs();
    </script>
</body>
</html>
