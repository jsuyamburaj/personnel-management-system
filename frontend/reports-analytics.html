<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics | Glass Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            line-height: 1.5;
        }

        /* Header with Logout */
        .header-with-logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logout-btn {
            background: rgba(245, 101, 101, 0.2);
            border: 1px solid rgba(245, 101, 101, 0.5);
            border-radius: 40px;
            padding: 10px 24px;
            color: #f56565;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: rgba(245, 101, 101, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 101, 101, 0.3);
        }

        /* Glass Widget */
        .dashboard-widget {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .dashboard-widget:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: white;
            font-weight: 600;
            margin-bottom: 0;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h5 {
            color: white;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        /* Form Controls */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            padding: 10px 16px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
            color: white;
            outline: none;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78, #38a169);
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(72, 187, 120, 0.4);
        }

        /* Grid System */
        .row {
            display: flex;
            flex-wrap: wrap;
            margin-right: -0.75rem;
            margin-left: -0.75rem;
        }

        .col-md-3 {
            flex: 0 0 auto;
            width: 25%;
            padding-right: 0.75rem;
            padding-left: 0.75rem;
        }

        .col-md-6 {
            flex: 0 0 auto;
            width: 50%;
            padding-right: 0.75rem;
            padding-left: 0.75rem;
        }

        @media (max-width: 768px) {
            .col-md-3, .col-md-6 {
                width: 100%;
                margin-bottom: 1rem;
            }
            
            .header-with-logout {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Utility Classes */
        .text-center {
            text-align: center;
        }

        .text-muted {
            color: rgba(255, 255, 255, 0.6) !important;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-3 {
            margin-bottom: 1rem;
        }

        .mb-4 {
            margin-bottom: 1.5rem;
        }

        .mt-2 {
            margin-top: 0.5rem;
        }

        .py-5 {
            padding-top: 3rem;
            padding-bottom: 3rem;
        }

        .w-100 {
            width: 100%;
        }

        .me-2 {
            margin-right: 0.5rem;
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            color: white;
            border-collapse: collapse;
        }

        .table thead th {
            border-bottom: 2px solid rgba(79, 172, 254, 0.5);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #4facfe;
        }

        .table tbody td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .table tbody tr:hover {
            background: rgba(79, 172, 254, 0.1);
        }

        /* Alert */
        .alert {
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        .alert-danger {
            background: rgba(245, 101, 101, 0.2);
            border: 1px solid rgba(245, 101, 101, 0.3);
            color: #f56565;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79, 172, 254, 0.2);
            border-radius: 50%;
            border-top-color: #4facfe;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4facfe;
            border-radius: 10px;
        }

        /* Chart Containers */
        canvas {
            max-height: 250px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div>
        <!-- Header with Logout Button -->
        <div class="header-with-logout">
            <h2><i class="fas fa-chart-line me-2"></i> Reports & Analytics</h2>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </button>
        </div>
        
        <!-- Report Filters -->
        <div class="dashboard-widget">
            <div class="row">
                <div class="col-md-3">
                    <label class="form-label">Report Type</label>
                    <select class="form-select" id="reportType">
                        <option value="attendance">📊 Attendance Report</option>
                        <option value="performance">⭐ Performance Report</option>
                        <option value="project">📁 Project Progress</option>
                        <option value="tasks">✅ Task Analytics</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">From Date</label>
                    <input type="month" class="form-control" id="fromMonth">
                </div>
                <div class="col-md-3">
                    <label class="form-label">To Date</label>
                    <input type="month" class="form-control" id="toMonth">
                </div>
                <div class="col-md-3">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn-primary w-100" onclick="generateReport()">
                        <i class="fas fa-chart-line me-2"></i> Generate Report
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Report Output -->
        <div class="dashboard-widget" id="reportOutput">
            <div class="text-center py-5">
                <i class="fas fa-chart-line fa-3x" style="color: rgba(255,255,255,0.3); margin-bottom: 1rem;"></i>
                <p class="text-muted">Select report type and date range to generate analytics</p>
                <small class="text-muted">Choose from Attendance, Performance, or Project reports</small>
            </div>
        </div>
    </div>
    
    <!-- Charts for Analytics -->
    <div class="row">
        <div class="col-md-6">
            <div class="dashboard-widget">
                <h5><i class="fas fa-calendar-check me-2"></i> Attendance Overview</h5>
                <canvas id="attendanceReportChart" height="250"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="dashboard-widget">
                <h5><i class="fas fa-tasks me-2"></i> Task Completion Rate</h5>
                <canvas id="taskReportChart" height="250"></canvas>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        let attendanceChart = null;
        let taskChart = null;
        
        async function generateReport() {
            const type = document.getElementById('reportType').value;
            const from = document.getElementById('fromMonth').value;
            const to = document.getElementById('toMonth').value;
            
            const output = document.getElementById('reportOutput');
            output.innerHTML = '<div class="text-center py-5"><div class="loading-spinner"></div><p class="mt-3 text-muted">Generating report...</p></div>';
            
            try {
                if (type === 'attendance') {
                    const response = await fetch(`http://localhost:8000/api/analytics/dashboard`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    const data = await response.json();
                    
                    const totalPresent = data.attendance_trend?.reduce((a, b) => a + b.present, 0) || 0;
                    const avgAttendance = (totalPresent / (data.attendance_trend?.length || 1)).toFixed(1);
                    
                    output.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 style="color: #4facfe;">
                                <i class="fas fa-calendar-alt me-2"></i>Attendance Report
                                ${from ? `(${from} - ${to || 'Present'})` : ''}
                            </h5>
                            <button class="btn-success" onclick="exportReport('attendance')">
                                <i class="fas fa-download me-2"></i> Export CSV
                            </button>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <div class="text-center">
                                    <small class="text-muted">Total Employees</small>
                                    <h3 style="color: #4facfe;">${data.total_employees || 0}</h3>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-center">
                                    <small class="text-muted">Avg Daily Attendance</small>
                                    <h3 style="color: #48bb78;">${avgAttendance}</h3>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-center">
                                    <small class="text-muted">Active Projects</small>
                                    <h3 style="color: #ed8936;">${data.active_projects || 0}</h3>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // Update attendance chart
                    if (attendanceChart) attendanceChart.destroy();
                    const ctx = document.getElementById('attendanceReportChart').getContext('2d');
                    attendanceChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.attendance_trend?.slice(-14).map(d => d.date) || [],
                            datasets: [{
                                label: 'Present Employees',
                                data: data.attendance_trend?.slice(-14).map(d => d.present) || [],
                                borderColor: '#4facfe',
                                backgroundColor: 'rgba(79, 172, 254, 0.1)',
                                borderWidth: 2,
                                tension: 0.4,
                                fill: true,
                                pointBackgroundColor: '#4facfe',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { labels: { color: 'white' } }
                            },
                            scales: {
                                y: { 
                                    grid: { color: 'rgba(255,255,255,0.1)' },
                                    ticks: { color: 'white' }
                                },
                                x: { 
                                    grid: { display: false },
                                    ticks: { color: 'white', rotation: 45, maxRotation: 45 }
                                }
                            }
                        }
                    });
                    
                } else if (type === 'performance') {
                    const response = await fetch(`http://localhost:8000/api/performance/team`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    const team = await response.json();
                    
                    output.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 style="color: #4facfe;">
                                <i class="fas fa-star me-2"></i>Team Performance Report
                            </h5>
                            <button class="btn-success" onclick="exportReport('performance')">
                                <i class="fas fa-download me-2"></i> Export CSV
                            </button>
                        </div>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr><th>Employee</th><th>Average Rating</th><th>Performance Level</th></tr>
                                </thead>
                                <tbody>
                                    ${team.map(m => {
                                        const rating = m.average_rating || 0;
                                        let performanceLevel = '';
                                        let levelColor = '';
                                        if (rating >= 4.5) {
                                            performanceLevel = 'Excellent';
                                            levelColor = '#48bb78';
                                        } else if (rating >= 3.5) {
                                            performanceLevel = 'Good';
                                            levelColor = '#4facfe';
                                        } else if (rating >= 2.5) {
                                            performanceLevel = 'Average';
                                            levelColor = '#ed8936';
                                        } else {
                                            performanceLevel = 'Needs Improvement';
                                            levelColor = '#f56565';
                                        }
                                        return `
                                            <tr>
                                                <td>${m.name || m.email.split('@')[0]}</td>
                                                <td>
                                                    <div class="d-flex align-items-center">
                                                        <strong style="color: ${levelColor}; min-width: 40px;">${rating}/5</strong>
                                                        <div class="progress ms-2" style="flex: 1; height: 6px;">
                                                            <div class="progress-bar" style="width: ${(rating/5)*100}%; background: ${levelColor};"></div>
                                                        </div>
                                                    </div>
                                                  </div>
                                                <td><span style="color: ${levelColor};">${performanceLevel}</span></td>
                                             </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else if (type === 'project') {
                    const response = await fetch(`http://localhost:8000/api/projects/`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    const projects = await response.json();
                    
                    output.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 style="color: #4facfe;">
                                <i class="fas fa-project-diagram me-2"></i>Project Progress Report
                            </h5>
                            <button class="btn-success" onclick="exportReport('project')">
                                <i class="fas fa-download me-2"></i> Export CSV
                            </button>
                        </div>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr><th>Project</th><th>Progress</th><th>Status</th><th>Timeline</th></tr>
                                </thead>
                                <tbody>
                                    ${projects.map(p => `
                                        <tr>
                                            <td><strong>${p.name}</strong></td>
                                            <td>
                                                <div class="d-flex align-items-center">
                                                    <span style="min-width: 45px;">${p.progress || 0}%</span>
                                                    <div class="progress ms-2" style="flex: 1; height: 6px;">
                                                        <div class="progress-bar" style="width: ${p.progress || 0}%; background: linear-gradient(90deg, #4facfe, #00f2fe);"></div>
                                                    </div>
                                                </div>
                                              </div>
                                            <td>
                                                <span class="badge" style="background: ${p.status === 'Active' ? 'rgba(72,187,120,0.3)' : p.status === 'Completed' ? 'rgba(66,153,225,0.3)' : 'rgba(113,128,150,0.3)'}; color: ${p.status === 'Active' ? '#48bb78' : p.status === 'Completed' ? '#4299e1' : '#a0aec0'};">
                                                    ${p.status}
                                                </span>
                                              </div>
                                            <td><small>${p.start_date?.split('T')[0] || 'N/A'} → ${p.end_date?.split('T')[0] || 'Ongoing'}</small></div>
                                          </div>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error generating report:', error);
                output.innerHTML = '<div class="alert alert-danger text-center">Failed to generate report. Please try again.</div>';
            }
        }
        
        function exportReport(type) {
            // Simple CSV export simulation
            alert(`CSV export for ${type} report would download here.\n\nIn production, this would generate and download a CSV file.`);
        }
        
        // Load default charts
        async function loadDefaultCharts() {
            try {
                // Load attendance chart
                const analytics = await fetch('http://localhost:8000/api/analytics/dashboard', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                }).then(res => res.json()).catch(() => null);
                
                if (analytics && analytics.attendance_trend) {
                    attendanceChart = new Chart(document.getElementById('attendanceReportChart'), {
                        type: 'line',
                        data: {
                            labels: analytics.attendance_trend?.slice(-7).map(d => d.date) || ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                            datasets: [{
                                label: 'Present Employees',
                                data: analytics.attendance_trend?.slice(-7).map(d => d.present) || [65, 70, 68, 72, 75, 60, 55],
                                borderColor: '#4facfe',
                                backgroundColor: 'rgba(79, 172, 254, 0.1)',
                                borderWidth: 2,
                                tension: 0.4,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: { legend: { labels: { color: 'white' } } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } },
                                x: { ticks: { color: 'white' } }
                            }
                        }
                    });
                }
                
                // Load task chart
                const taskRes = await fetch('http://localhost:8000/api/tasks/my-tasks', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const tasks = await taskRes.json();
                const statusCount = { Pending: 0, 'In Progress': 0, Completed: 0 };
                tasks.forEach(t => statusCount[t.status]++);
                
                taskChart = new Chart(document.getElementById('taskReportChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(statusCount),
                        datasets: [{
                            data: Object.values(statusCount),
                            backgroundColor: ['#ed8936', '#4facfe', '#48bb78'],
                            borderWidth: 0,
                            hoverOffset: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { 
                                position: 'bottom',
                                labels: { color: 'white', usePointStyle: true, pointStyle: 'circle' }
                            }
                        },
                        cutout: '60%'
                    }
                });
            } catch (error) {
                console.error('Error loading default charts:', error);
                // Create fallback charts
                if (attendanceChart) attendanceChart.destroy();
                if (taskChart) taskChart.destroy();
                
                attendanceChart = new Chart(document.getElementById('attendanceReportChart'), {
                    type: 'line',
                    data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'], datasets: [{ label: 'Present', data: [65, 70, 68, 72, 75], borderColor: '#4facfe' }] }
                });
                taskChart = new Chart(document.getElementById('taskReportChart'), {
                    type: 'doughnut',
                    data: { labels: ['Pending', 'In Progress', 'Completed'], datasets: [{ data: [5, 3, 2], backgroundColor: ['#ed8936', '#4facfe', '#48bb78'] }] }
                });
            }
        }
        
        // Initialize on page load
        loadDefaultCharts();
    </script>
</body>
</html>
