<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>
</head>
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Employee Management</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#employeeModal" onclick="openAddEmployeeModal()">
                <i class="fas fa-plus"></i> Add Employee
            </button>
        </div>
        
        <!-- Filters -->
        <div class="row mb-4">
            <div class="col-md-3">
                <input type="text" class="form-control" id="searchInput" placeholder="Search by name, email, department...">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="departmentFilter">
                    <option value="">All Departments</option>
                    <option>Engineering</option>
                    <option>Product</option>
                    <option>HR</option>
                    <option>Sales</option>
                    <option>Marketing</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="roleFilter">
                    <option value="">All Roles</option>
                    <option>Admin</option>
                    <option>Manager</option>
                    <option>Developer</option>
                    <option>Tester</option>
                    <option>HR</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="statusFilter">
                    <option value="">All Status</option>
                    <option>Active</option>
                    <option>On Leave</option>
                    <option>Inactive</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-outline-secondary" onclick="resetFilters()">Reset Filters</button>
            </div>
        </div>
        
        <!-- Employee Table -->
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Employee</th>
                        <th>Department</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Join Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody">
                    <tr><td colspan="8" class="text-center">Loading employees...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- Pagination -->
        <nav class="mt-3">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>
    
    <!-- Employee Modal -->
    <div class="modal fade" id="employeeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="employeeForm">
                        <input type="hidden" id="employeeId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>First Name</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Last Name</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Department</label>
                                <select class="form-select" id="department">
                                    <option>Engineering</option>
                                    <option>Product</option>
                                    <option>HR</option>
                                    <option>Sales</option>
                                    <option>Marketing</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Role</label>
                                <select class="form-select" id="role">
                                    <option>Developer</option>
                                    <option>Tester</option>
                                    <option>Manager</option>
                                    <option>HR</option>
                                    <option>Employee</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Phone</label>
                                <input type="text" class="form-control" id="phone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Join Date</label>
                                <input type="date" class="form-control" id="joinDate">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Skills (comma separated)</label>
                            <input type="text" class="form-control" id="skills" placeholder="React, Python, MongoDB">
                        </div>
                        <div class="mb-3">
                            <label>Salary</label>
                            <input type="number" class="form-control" id="salary">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveEmployee()">Save Employee</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to delete this employee?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentPage = 1;
        let deleteId = null;
        let employeesData = [];
        
        // Sample employee data for demo
        const sampleEmployees = [
            { id: 1, firstName: 'John', lastName: 'Doe', email: 'john@spms.com', department: 'Engineering', role: 'Developer', status: 'Active', joinDate: '2023-01-15', phone: '1234567890', skills: 'React,Python', salary: 75000 },
            { id: 2, firstName: 'Jane', lastName: 'Smith', email: 'jane@spms.com', department: 'Product', role: 'Manager', status: 'Active', joinDate: '2022-06-20', phone: '1234567891', skills: 'Product Management', salary: 95000 },
            { id: 3, firstName: 'Mike', lastName: 'Johnson', email: 'mike@spms.com', department: 'Engineering', role: 'Tester', status: 'Active', joinDate: '2023-03-10', phone: '1234567892', skills: 'Selenium,Java', salary: 65000 },
            { id: 4, firstName: 'Sarah', lastName: 'Williams', email: 'sarah@spms.com', department: 'HR', role: 'HR', status: 'Active', joinDate: '2021-11-01', phone: '1234567893', skills: 'Recruitment', salary: 70000 },
            { id: 5, firstName: 'David', lastName: 'Brown', email: 'david@spms.com', department: 'Marketing', role: 'Employee', status: 'On Leave', joinDate: '2023-05-15', phone: '1234567894', skills: 'SEO,Content', salary: 60000 }
        ];
        
        function loadEmployees() {
            // In real app, fetch from API
            employeesData = sampleEmployees;
            renderTable();
        }
        
        function renderTable() {
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const dept = document.getElementById('departmentFilter')?.value || '';
            const role = document.getElementById('roleFilter')?.value || '';
            const status = document.getElementById('statusFilter')?.value || '';
            
            let filtered = employeesData.filter(emp => {
                const fullName = `${emp.firstName} ${emp.lastName}`.toLowerCase();
                const matchesSearch = fullName.includes(search) || emp.email.toLowerCase().includes(search);
                const matchesDept = !dept || emp.department === dept;
                const matchesRole = !role || emp.role === role;
                const matchesStatus = !status || emp.status === status;
                return matchesSearch && matchesDept && matchesRole && matchesStatus;
            });
            
            const tbody = document.getElementById('employeeTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">No employees found</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(emp => `
                <tr>
                    <td>${emp.id}</td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="user-avatar me-2" style="width:35px;height:35px;font-size:14px">
                                ${emp.firstName[0]}${emp.lastName[0]}
                            </div>
                            <div>${emp.firstName} ${emp.lastName}</div>
                        </div>
                    </td>
                    <td>${emp.department}</td>
                    <td><span class="badge bg-secondary">${emp.role}</span></td>
                    <td>${emp.email}</td>
                    <td><span class="badge bg-${emp.status === 'Active' ? 'success' : emp.status === 'On Leave' ? 'warning' : 'danger'}">${emp.status}</span></td>
                    <td>${emp.joinDate}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editEmployee(${emp.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${emp.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        
        function openAddEmployeeModal() {
            document.getElementById('modalTitle').innerText = 'Add Employee';
            document.getElementById('employeeForm').reset();
            document.getElementById('employeeId').value = '';
            new bootstrap.Modal(document.getElementById('employeeModal')).show();
        }
        
        function editEmployee(id) {
            const emp = employeesData.find(e => e.id === id);
            if (emp) {
                document.getElementById('modalTitle').innerText = 'Edit Employee';
                document.getElementById('employeeId').value = emp.id;
                document.getElementById('firstName').value = emp.firstName;
                document.getElementById('lastName').value = emp.lastName;
                document.getElementById('email').value = emp.email;
                document.getElementById('department').value = emp.department;
                document.getElementById('role').value = emp.role;
                document.getElementById('phone').value = emp.phone || '';
                document.getElementById('joinDate').value = emp.joinDate;
                document.getElementById('skills').value = emp.skills || '';
                document.getElementById('salary').value = emp.salary || '';
                new bootstrap.Modal(document.getElementById('employeeModal')).show();
            }
        }
        
        function saveEmployee() {
            const id = document.getElementById('employeeId').value;
            const employee = {
                id: id ? parseInt(id) : employeesData.length + 1,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                department: document.getElementById('department').value,
                role: document.getElementById('role').value,
                phone: document.getElementById('phone').value,
                joinDate: document.getElementById('joinDate').value,
                skills: document.getElementById('skills').value,
                salary: parseInt(document.getElementById('salary').value) || 0,
                status: 'Active'
            };
            
            if (id) {
                const index = employeesData.findIndex(e => e.id === parseInt(id));
                if (index !== -1) employeesData[index] = employee;
            } else {
                employeesData.push(employee);
            }
            
            bootstrap.Modal.getInstance(document.getElementById('employeeModal')).hide();
            renderTable();
            showToast('Employee saved successfully!', 'success');
        }
        
        function confirmDelete(id) {
            deleteId = id;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
        
        document.getElementById('confirmDeleteBtn')?.addEventListener('click', () => {
            if (deleteId) {
                employeesData = employeesData.filter(e => e.id !== deleteId);
                renderTable();
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                showToast('Employee deleted successfully!', 'success');
            }
        });
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('departmentFilter').value = '';
            document.getElementById('roleFilter').value = '';
            document.getElementById('statusFilter').value = '';
            renderTable();
        }
        
        function showToast(message, type) {
            const toastHtml = `
                <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
                    <div class="toast align-items-center text-white bg-${type} border-0" role="alert">
                        <div class="d-flex">
                            <div class="toast-body">${message}</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', toastHtml);
            const toastEl = document.querySelector('.toast:last-child');
            const toast = new bootstrap.Toast(toastEl, { autohide: true, delay: 3000 });
            toast.show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        }
        
        // Add event listeners
        document.getElementById('searchInput')?.addEventListener('input', renderTable);
        document.getElementById('departmentFilter')?.addEventListener('change', renderTable);
        document.getElementById('roleFilter')?.addEventListener('change', renderTable);
        document.getElementById('statusFilter')?.addEventListener('change', renderTable);
        
        loadEmployees();
    </script>
</body>
</html>
