<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management | Glass Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            line-height: 1.5;
        }

        /* Glass Container */
        .glass-container {
            background: transparent;
        }

        h2 {
            color: white;
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Form Controls */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            padding: 10px 16px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
            color: white;
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }

        .btn-outline-secondary {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 10px 24px;
            color: white;
            transition: all 0.3s;
        }

        .btn-outline-secondary:hover {
            background: rgba(79, 172, 254, 0.3);
            border-color: #4facfe;
            transform: translateY(-2px);
        }

        .btn-outline-primary {
            background: rgba(79, 172, 254, 0.2);
            border: 1px solid #4facfe;
            border-radius: 30px;
            padding: 5px 12px;
            color: #4facfe;
            transition: all 0.3s;
        }

        .btn-outline-primary:hover {
            background: #4facfe;
            color: white;
            transform: translateY(-1px);
        }

        .btn-outline-danger {
            background: rgba(245, 101, 101, 0.2);
            border: 1px solid #f56565;
            border-radius: 30px;
            padding: 5px 12px;
            color: #f56565;
            transition: all 0.3s;
        }

        .btn-outline-danger:hover {
            background: #f56565;
            color: white;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565, #dc2626);
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            transition: all 0.3s;
        }

        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 101, 101, 0.4);
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            color: white;
            border-collapse: collapse;
        }

        .table thead th {
            border-bottom: 2px solid rgba(79, 172, 254, 0.5);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #4facfe;
        }

        .table tbody td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background: rgba(79, 172, 254, 0.1);
        }

        /* Badge Styles */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .bg-secondary {
            background: rgba(79, 172, 254, 0.3);
            color: #4facfe;
        }

        .bg-success {
            background: rgba(72, 187, 120, 0.3);
            color: #48bb78;
        }

        .bg-warning {
            background: rgba(237, 137, 54, 0.3);
            color: #ed8936;
        }

        .bg-danger {
            background: rgba(245, 101, 101, 0.3);
            color: #f56565;
        }

        /* User Avatar */
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        /* Modal Styles - Glass */
        .modal-content {
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            color: white;
        }

        .modal-header {
            border-bottom: 1px solid rgba(79, 172, 254, 0.3);
            padding: 1.2rem 1.5rem;
        }

        .modal-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
        }

        .modal-title {
            color: white;
        }

        .btn-close {
            filter: invert(1);
        }

        /* Grid System */
        .row {
            display: flex;
            flex-wrap: wrap;
            margin-right: -0.75rem;
            margin-left: -0.75rem;
        }

        .col-md-2 {
            flex: 0 0 auto;
            width: 16.666%;
            padding-right: 0.75rem;
            padding-left: 0.75rem;
        }

        .col-md-3 {
            flex: 0 0 auto;
            width: 25%;
            padding-right: 0.75rem;
            padding-left: 0.75rem;
        }

        .col-md-6 {
            flex: 0 0 auto;
            width: 50%;
            padding-right: 0.75rem;
            padding-left: 0.75rem;
        }

        @media (max-width: 768px) {
            .col-md-2, .col-md-3, .col-md-6 {
                width: 100%;
                margin-bottom: 1rem;
            }
        }

        /* Utility Classes */
        .d-flex {
            display: flex;
        }

        .justify-content-between {
            justify-content: space-between;
        }

        .align-items-center {
            align-items: center;
        }

        .mb-4 {
            margin-bottom: 1.5rem;
        }

        .mb-3 {
            margin-bottom: 1rem;
        }

        .mt-3 {
            margin-top: 1rem;
        }

        .me-1 {
            margin-right: 0.25rem;
        }

        .me-2 {
            margin-right: 0.5rem;
        }

        .text-center {
            text-align: center;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 0.5rem;
        }

        .page-item .page-link {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            padding: 8px 12px;
            transition: all 0.3s;
        }

        .page-item .page-link:hover {
            background: rgba(79, 172, 254, 0.3);
            border-color: #4facfe;
        }

        /* Toast Notification */
        .toast-glass {
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 16px;
            color: white;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4facfe;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-users me-2"></i> Employee Management</h2>
            <button class="btn-primary" data-bs-toggle="modal" data-bs-target="#employeeModal" onclick="openAddEmployeeModal()">
                <i class="fas fa-plus me-2"></i> Add Employee
            </button>
        </div>
        
        <!-- Filters -->
        <div class="glass-card">
            <div class="row">
                <div class="col-md-3">
                    <input type="text" class="form-control" id="searchInput" placeholder="🔍 Search by name, email...">
                </div>
                <div class="col-md-2">
                    <select class="form-select" id="departmentFilter">
                        <option value="">All Departments</option>
                        <option>Engineering</option>
                        <option>Product</option>
                        <option>HR</option>
                        <option>Sales</option>
                        <option>Marketing</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" id="roleFilter">
                        <option value="">All Roles</option>
                        <option>Admin</option>
                        <option>Manager</option>
                        <option>Developer</option>
                        <option>Tester</option>
                        <option>HR</option>
                        <option>Employee</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option>Active</option>
                        <option>On Leave</option>
                        <option>Inactive</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn-outline-secondary w-100" onclick="resetFilters()">
                        <i class="fas fa-undo-alt me-2"></i> Reset Filters
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Employee Table -->
        <div class="glass-card">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Employee</th>
                            <th>Department</th>
                            <th>Role</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Join Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                        <tr><td colspan="8" class="text-center">
                            <div class="loading-spinner" style="display: inline-block; width: 40px; height: 40px; border: 3px solid rgba(79,172,254,0.2); border-radius: 50%; border-top-color: #4facfe; animation: spin 0.8s linear infinite;"></div>
                            <p class="mt-2">Loading employees...</p>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Pagination -->
        <nav class="mt-3">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>
    
    <!-- Employee Modal -->
    <div class="modal fade" id="employeeModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">
                        <i class="fas fa-user-plus me-2"></i> Add Employee
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="employeeForm">
                        <input type="hidden" id="employeeId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>First Name</label>
                                <input type="text" class="form-control" id="firstName" required placeholder="Enter first name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Last Name</label>
                                <input type="text" class="form-control" id="lastName" required placeholder="Enter last name">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control" id="email" required placeholder="employee@company.com">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Department</label>
                                <select class="form-select" id="department">
                                    <option>Engineering</option>
                                    <option>Product</option>
                                    <option>HR</option>
                                    <option>Sales</option>
                                    <option>Marketing</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Role</label>
                                <select class="form-select" id="role">
                                    <option>Developer</option>
                                    <option>Tester</option>
                                    <option>Manager</option>
                                    <option>HR</option>
                                    <option>Employee</option>
                                    <option>Admin</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Phone</label>
                                <input type="text" class="form-control" id="phone" placeholder="+1 234 567 8900">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Join Date</label>
                                <input type="date" class="form-control" id="joinDate">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Skills (comma separated)</label>
                            <input type="text" class="form-control" id="skills" placeholder="React, Python, MongoDB">
                        </div>
                        <div class="mb-3">
                            <label>Salary ($)</label>
                            <input type="number" class="form-control" id="salary" placeholder="50000">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-primary" onclick="saveEmployee()">
                        <i class="fas fa-save me-2"></i> Save Employee
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-exclamation-triangle me-2"></i> Confirm Delete
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this employee?</p>
                    <small class="text-muted">This action cannot be undone.</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-danger" id="confirmDeleteBtn">
                        <i class="fas fa-trash me-2"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script>
        let currentPage = 1;
        let deleteId = null;
        let employeesData = [];
        
        // Sample employee data for demo
        const sampleEmployees = [
            { id: 1, firstName: 'John', lastName: 'Doe', email: 'john@spms.com', department: 'Engineering', role: 'Developer', status: 'Active', joinDate: '2023-01-15', phone: '1234567890', skills: 'React,Python', salary: 75000 },
            { id: 2, firstName: 'Jane', lastName: 'Smith', email: 'jane@spms.com', department: 'Product', role: 'Manager', status: 'Active', joinDate: '2022-06-20', phone: '1234567891', skills: 'Product Management', salary: 95000 },
            { id: 3, firstName: 'Mike', lastName: 'Johnson', email: 'mike@spms.com', department: 'Engineering', role: 'Tester', status: 'Active', joinDate: '2023-03-10', phone: '1234567892', skills: 'Selenium,Java', salary: 65000 },
            { id: 4, firstName: 'Sarah', lastName: 'Williams', email: 'sarah@spms.com', department: 'HR', role: 'HR', status: 'Active', joinDate: '2021-11-01', phone: '1234567893', skills: 'Recruitment', salary: 70000 },
            { id: 5, firstName: 'David', lastName: 'Brown', email: 'david@spms.com', department: 'Marketing', role: 'Employee', status: 'On Leave', joinDate: '2023-05-15', phone: '1234567894', skills: 'SEO,Content', salary: 60000 }
        ];
        
        function loadEmployees() {
            // In real app, fetch from API
            employeesData = sampleEmployees;
            renderTable();
        }
        
        function renderTable() {
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const dept = document.getElementById('departmentFilter')?.value || '';
            const role = document.getElementById('roleFilter')?.value || '';
            const status = document.getElementById('statusFilter')?.value || '';
            
            let filtered = employeesData.filter(emp => {
                const fullName = `${emp.firstName} ${emp.lastName}`.toLowerCase();
                const matchesSearch = fullName.includes(search) || emp.email.toLowerCase().includes(search);
                const matchesDept = !dept || emp.department === dept;
                const matchesRole = !role || emp.role === role;
                const matchesStatus = !status || emp.status === status;
                return matchesSearch && matchesDept && matchesRole && matchesStatus;
            });
            
            const tbody = document.getElementById('employeeTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center"><i class="fas fa-inbox fa-2x mb-2 d-block"></i>No employees found</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(emp => `
                <tr>
                    <td>${emp.id}</td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="user-avatar me-2">
                                ${emp.firstName[0]}${emp.lastName[0]}
                            </div>
                            <div><strong>${emp.firstName} ${emp.lastName}</strong></div>
                        </div>
                    </td>
                    <td>${emp.department}</td>
                    <td><span class="badge bg-secondary">${emp.role}</span></td>
                    <td>${emp.email}</td>
                    <td><span class="badge ${emp.status === 'Active' ? 'bg-success' : emp.status === 'On Leave' ? 'bg-warning' : 'bg-danger'}">${emp.status}</span></td>
                    <td>${emp.joinDate}</td>
                    <td>
                        <button class="btn-outline-primary me-1" onclick="editEmployee(${emp.id})" style="padding: 5px 10px;">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-outline-danger" onclick="confirmDelete(${emp.id})" style="padding: 5px 10px;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function openAddEmployeeModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus me-2"></i> Add Employee';
            document.getElementById('employeeForm').reset();
            document.getElementById('employeeId').value = '';
            new bootstrap.Modal(document.getElementById('employeeModal')).show();
        }
        
        function editEmployee(id) {
            const emp = employeesData.find(e => e.id === id);
            if (emp) {
                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit me-2"></i> Edit Employee';
                document.getElementById('employeeId').value = emp.id;
                document.getElementById('firstName').value = emp.firstName;
                document.getElementById('lastName').value = emp.lastName;
                document.getElementById('email').value = emp.email;
                document.getElementById('department').value = emp.department;
                document.getElementById('role').value = emp.role;
                document.getElementById('phone').value = emp.phone || '';
                document.getElementById('joinDate').value = emp.joinDate;
                document.getElementById('skills').value = emp.skills || '';
                document.getElementById('salary').value = emp.salary || '';
                new bootstrap.Modal(document.getElementById('employeeModal')).show();
            }
        }
        
        function saveEmployee() {
            const id = document.getElementById('employeeId').value;
            const employee = {
                id: id ? parseInt(id) : employeesData.length + 1,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                department: document.getElementById('department').value,
                role: document.getElementById('role').value,
                phone: document.getElementById('phone').value,
                joinDate: document.getElementById('joinDate').value,
                skills: document.getElementById('skills').value,
                salary: parseInt(document.getElementById('salary').value) || 0,
                status: 'Active'
            };
            
            if (id) {
                const index = employeesData.findIndex(e => e.id === parseInt(id));
                if (index !== -1) employeesData[index] = employee;
            } else {
                employeesData.push(employee);
            }
            
            bootstrap.Modal.getInstance(document.getElementById('employeeModal')).hide();
            renderTable();
            showToast('Employee saved successfully!', 'success');
        }
        
        function confirmDelete(id) {
            deleteId = id;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
        
        document.getElementById('confirmDeleteBtn')?.addEventListener('click', () => {
            if (deleteId) {
                employeesData = employeesData.filter(e => e.id !== deleteId);
                renderTable();
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                showToast('Employee deleted successfully!', 'success');
            }
        });
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('departmentFilter').value = '';
            document.getElementById('roleFilter').value = '';
            document.getElementById('statusFilter').value = '';
            renderTable();
        }
        
        function showToast(message, type) {
            const toastDiv = document.createElement('div');
            toastDiv.className = 'position-fixed bottom-0 end-0 p-3';
            toastDiv.style.zIndex = '9999';
            toastDiv.innerHTML = `
                <div class="toast-glass toast align-items-center show" role="alert" style="min-width: 250px;">
                    <div class="d-flex">
                        <div class="toast-body">
                            <i class="fas fa-${type === 'success' ? 'check-circle' : 'trash'} me-2" style="color: ${type === 'success' ? '#48bb78' : '#f56565'}"></i>
                            ${message}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            document.body.appendChild(toastDiv);
            setTimeout(() => toastDiv.remove(), 3000);
        }
        
        // Add event listeners
        document.getElementById('searchInput')?.addEventListener('input', renderTable);
        document.getElementById('departmentFilter')?.addEventListener('change', renderTable);
        document.getElementById('roleFilter')?.addEventListener('change', renderTable);
        document.getElementById('statusFilter')?.addEventListener('change', renderTable);
        
        // Add spinning animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
        
        loadEmployees();
    </script>
</body>
</html>
