<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management | Glass Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            line-height: 1.5;
        }

        /* Header with Logout */
        .header-with-logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logout-btn {
            background: rgba(245, 101, 101, 0.2);
            border: 1px solid rgba(245, 101, 101, 0.5);
            border-radius: 40px;
            padding: 10px 24px;
            color: #f56565;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: rgba(245, 101, 101, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 101, 101, 0.3);
        }

        /* Glass Widget */
        .dashboard-widget {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .dashboard-widget:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: white;
            font-weight: 600;
            margin-bottom: 0;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h3 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        h5 {
            color: white;
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            color: white;
            border-collapse: collapse;
        }

        .table thead th {
            border-bottom: 2px solid rgba(79, 172, 254, 0.5);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #4facfe;
        }

        .table tbody td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background: rgba(79, 172, 254, 0.1);
        }

        /* Badge Styles */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .bg-success {
            background: rgba(72, 187, 120, 0.3);
            color: #48bb78;
        }

        .bg-danger {
            background: rgba(245, 101, 101, 0.3);
            color: #f56565;
        }

        .bg-warning {
            background: rgba(237, 137, 54, 0.3);
            color: #ed8936;
        }

        /* Modal Styles - Glass */
        .modal-content {
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            color: white;
        }

        .modal-header {
            border-bottom: 1px solid rgba(79, 172, 254, 0.3);
            padding: 1.2rem 1.5rem;
        }

        .modal-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
        }

        .modal-title {
            color: white;
        }

        .btn-close {
            filter: invert(1);
        }

        /* Form Controls */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            padding: 10px 16px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
            color: white;
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Grid System */
        .row {
            display: flex;
            flex-wrap: wrap;
            margin-right: -0.75rem;
            margin-left: -0.75rem;
        }

        .col-md-4 {
            flex: 0 0 auto;
            width: 33.333%;
            padding-right: 0.75rem;
            padding-left: 0.75rem;
        }

        .col-md-6 {
            flex: 0 0 auto;
            width: 50%;
            padding-right: 0.75rem;
            padding-left: 0.75rem;
        }

        @media (max-width: 768px) {
            .col-md-4, .col-md-6 {
                width: 100%;
                margin-bottom: 1rem;
            }
            
            .header-with-logout {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Utility Classes */
        .d-flex {
            display: flex;
        }

        .justify-content-between {
            justify-content: space-between;
        }

        .align-items-center {
            align-items: center;
        }

        .text-center {
            text-align: center;
        }

        .mb-3 {
            margin-bottom: 1rem;
        }

        .mb-4 {
            margin-bottom: 1.5rem;
        }

        .mt-3 {
            margin-top: 1rem;
        }

        .me-2 {
            margin-right: 0.5rem;
        }

        .text-muted {
            color: rgba(255, 255, 255, 0.6) !important;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79, 172, 254, 0.2);
            border-radius: 50%;
            border-top-color: #4facfe;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast-glass {
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 16px;
            color: white;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4facfe;
            border-radius: 10px;
        }

        /* Leave Balance Icon */
        .balance-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background: rgba(79, 172, 254, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div>
        <!-- Header with Logout Button -->
        <div class="header-with-logout">
            <h2><i class="fas fa-umbrella-beach me-2"></i> Leave Management</h2>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </button>
        </div>
        
        <!-- Request Leave Button Row -->
        <div class="d-flex justify-content-end mb-4">
            <button class="btn-primary" data-bs-toggle="modal" data-bs-target="#leaveModal" onclick="openRequestModal()">
                <i class="fas fa-plus me-2"></i> Request Leave
            </button>
        </div>
        
        <!-- Leave Balance Card -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="dashboard-widget text-center">
                    <div class="balance-icon">
                        <i class="fas fa-calendar-alt fa-2x" style="color: #4facfe;"></i>
                    </div>
                    <h3 id="leaveBalance">--</h3>
                    <p class="text-muted"><i class="fas fa-clock me-1"></i> Available Leave Days</p>
                </div>
            </div>
        </div>
        
        <!-- Leave Requests Table -->
        <div class="dashboard-widget">
            <h5 class="mb-3"><i class="fas fa-list-alt me-2"></i> My Leave Requests</h5>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th><i class="fas fa-calendar-alt me-1"></i> From</th>
                            <th><i class="fas fa-calendar-alt me-1"></i> To</th>
                            <th><i class="fas fa-tag me-1"></i> Type</th>
                            <th><i class="fas fa-comment me-1"></i> Reason</th>
                            <th><i class="fas fa-chart-simple me-1"></i> Status</th>
                        </tr>
                    </thead>
                    <tbody id="leaveRequests">
                        <tr><td colspan="5" class="text-center">
                            <div class="loading-spinner"></div>
                            <p class="mt-2">Loading leave requests...</p>
                        </td
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Leave Request Modal -->
    <div class="modal fade" id="leaveModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-paper-plane me-2"></i> Request Leave
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="leaveForm">
                        <div class="mb-3">
                            <label class="form-label">Leave Type</label>
                            <select class="form-select" id="leaveType" required>
                                <option>Annual</option>
                                <option>Sick</option>
                                <option>Personal</option>
                                <option>Unpaid</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">From Date</label>
                                <input type="date" class="form-control" id="startDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">To Date</label>
                                <input type="date" class="form-control" id="endDate" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Reason</label>
                            <textarea class="form-control" id="reason" rows="3" placeholder="Please provide reason for leave..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-primary" onclick="submitLeave()">
                        <i class="fas fa-paper-plane me-2"></i> Submit Request
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        async function loadLeaveBalance() {
            try {
                const response = await fetch('http://localhost:8000/api/leaves/balance', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    animateValue('leaveBalance', 0, data.available || 0, 1000);
                } else {
                    animateValue('leaveBalance', 0, 12, 1000);
                }
            } catch (error) {
                console.error('Error loading balance:', error);
                animateValue('leaveBalance', 0, 12, 1000);
            }
        }
        
        function animateValue(elementId, start, end, duration) {
            const element = document.getElementById(elementId);
            if (!element) return;
            const range = end - start;
            const increment = range / (duration / 16);
            let current = start;
            const timer = setInterval(() => {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                    element.innerText = end;
                    clearInterval(timer);
                } else {
                    element.innerText = Math.round(current);
                }
            }, 16);
        }
        
        async function loadLeaveRequests() {
            try {
                const response = await fetch('http://localhost:8000/api/leaves/my-requests', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (response.ok) {
                    const leaves = await response.json();
                    const tbody = document.getElementById('leaveRequests');
                    if (leaves.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center"><i class="fas fa-inbox fa-2x mb-2 d-block"></i>No leave requests found</td></tr>';
                        return;
                    }
                    tbody.innerHTML = leaves.map(leave => {
                        let statusIcon = '';
                        let statusClass = '';
                        if (leave.status === 'Approved') {
                            statusIcon = 'fa-check-circle';
                            statusClass = 'bg-success';
                        } else if (leave.status === 'Rejected') {
                            statusIcon = 'fa-times-circle';
                            statusClass = 'bg-danger';
                        } else {
                            statusIcon = 'fa-clock';
                            statusClass = 'bg-warning';
                        }
                        return `
                            <tr>
                                <td><i class="fas fa-calendar-day me-1"></i>${new Date(leave.start_date).toLocaleDateString()}</td>
                                <td><i class="fas fa-calendar-day me-1"></i>${new Date(leave.end_date).toLocaleDateString()}</td>
                                <td>${leave.leave_type}</td>
                                <td>${leave.reason || '-'}</td>
                                <td><span class="badge ${statusClass}"><i class="fas ${statusIcon} me-1"></i>${leave.status}</span></td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error loading leaves:', error);
                document.getElementById('leaveRequests').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Failed to load leave requests</td></tr>';
            }
        }
        
        async function submitLeave() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!startDate || !endDate) {
                showNotification('Please select both start and end dates', 'error');
                return;
            }
            
            if (new Date(startDate) > new Date(endDate)) {
                showNotification('Start date cannot be after end date', 'error');
                return;
            }
            
            const data = {
                leave_type: document.getElementById('leaveType').value,
                start_date: startDate,
                end_date: endDate,
                reason: document.getElementById('reason').value || 'No reason provided'
            };
            
            try {
                const response = await fetch('http://localhost:8000/api/leaves/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('leaveModal')).hide();
                    showNotification('Leave request submitted successfully!', 'success');
                    loadLeaveRequests();
                    loadLeaveBalance();
                } else {
                    const error = await response.json();
                    showNotification(error.detail || 'Failed to submit leave request', 'error');
                }
            } catch (error) {
                console.error('Error submitting leave:', error);
                showNotification('Error submitting leave request', 'error');
            }
        }
        
        function openRequestModal() {
            document.getElementById('leaveForm').reset();
            // Set default dates
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
            const nextWeek = new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0];
            document.getElementById('endDate').value = nextWeek;
        }
        
        function showNotification(message, type) {
            const toastDiv = document.createElement('div');
            toastDiv.className = 'position-fixed top-0 end-0 p-3';
            toastDiv.style.zIndex = '9999';
            toastDiv.innerHTML = `
                <div class="toast-glass toast align-items-center show" role="alert" style="min-width: 300px;">
                    <div class="d-flex">
                        <div class="toast-body">
                            <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2" style="color: ${type === 'success' ? '#48bb78' : '#f56565'}"></i>
                            ${message}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            document.body.appendChild(toastDiv);
            setTimeout(() => toastDiv.remove(), 3000);
        }
        
        // Load data on page load
        loadLeaveBalance();
        loadLeaveRequests();
    </script>
</body>
</html>
