<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMS | Glass Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: rgba(15, 32, 39, 0.85);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .sidebar .logo {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .sidebar .logo h3 {
            color: white;
            font-weight: 600;
        }
        
        .sidebar .logo small {
            color: rgba(255,255,255,0.7);
        }
        
        .sidebar .nav-link {
            color: rgba(255,255,255,0.85);
            padding: 12px 20px;
            margin: 5px 10px;
            border-radius: 30px;
            transition: 0.3s;
        }
        
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: rgba(79, 172, 254, 0.3);
            color: white;
            transform: translateX(5px);
        }
        
        .main-content {
            margin-left: 260px;
            transition: 0.3s;
        }
        
        .top-navbar {
            background: rgba(15, 32, 39, 0.85);
            backdrop-filter: blur(10px);
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .logout-nav-btn {
            background: rgba(245, 101, 101, 0.2);
            border: 1px solid rgba(245, 101, 101, 0.5);
            border-radius: 40px;
            padding: 6px 16px;
            color: #f56565;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.85rem;
            margin-left: 15px;
        }
        
        .logout-nav-btn:hover {
            background: rgba(245, 101, 101, 0.4);
            transform: translateY(-2px);
        }
        
        .page-content {
            padding: 20px;
            min-height: calc(100vh - 60px);
        }
        
        /* FIX: Force all text to be white inside page content */
        .page-content,
        .page-content * {
            color: whit;
        }
        
        .page-content .text-muted {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #4facfe; border-radius: 10px; }
        
        @media (max-width: 768px) {
            .sidebar { left: -260px; }
            .sidebar.show { left: 0; }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; }
        }
        
        .dropdown-menu {
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .dropdown-item {
            color: white;
        }
        
        .dropdown-item:hover {
            background: rgba(79, 172, 254, 0.3);
            color: white;
        }
        
        .btn-link {
            color: white;
            text-decoration: none;
        }
        
        .btn-link:hover {
            color: #4facfe;
        }
        
        .user-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <h3><i class="fas fa-cloud-upload-alt"></i> SPMS</h3>
            <small>Personnel Management System</small>
        </div>
        <nav class="nav flex-column mt-3" id="sidebarNav"></nav>
    </div>
    
    <div class="main-content">
        <div class="top-navbar">
            <button class="btn btn-link text-white d-md-none menu-toggle" id="menuToggle">
                <i class="fas fa-bars fa-lg"></i>
            </button>
            <div class="user-controls">
                <div class="dropdown">
                    <div class="d-flex align-items-center gap-2 text-white" data-bs-toggle="dropdown" style="cursor: pointer;">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <span id="userName">User</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2"></i>Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                    </ul>
                </div>
                <button class="logout-nav-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i> Logout
                </button>
            </div>
        </div>
        <div class="page-content" id="pageContent">Loading...</div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:8000/api';
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        async function init() {
            const token = localStorage.getItem('token');
            if (!token) { 
                window.location.href = 'index.html'; 
                return; 
            }
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userName').innerText = user.full_name || user.email;
            document.getElementById('userAvatar').innerText = (user.full_name?.[0] || user.email?.[0] || 'U').toUpperCase();
            loadSidebar(user.role);
            loadPageContent();
        }
        
        function loadSidebar(role) {
            const menu = { 
                admin: [
                    { icon:'fas fa-tachometer-alt', text:'Dashboard', page:'admin-dashboard.html' },
                    { icon:'fas fa-users', text:'Employees', page:'employee-management.html' },
                    { icon:'fas fa-project-diagram', text:'Projects', page:'project-management.html' },
                    { icon:'fas fa-tasks', text:'Tasks', page:'task-management.html' },
                    { icon:'fas fa-calendar-check', text:'Attendance', page:'attendance.html' },
                    { icon:'fas fa-umbrella-beach', text:'Leaves', page:'leave-management.html' },
                    { icon:'fas fa-money-bill-wave', text:'Payroll', page:'payroll.html' },
                    { icon:'fas fa-chart-line', text:'Reports', page:'reports-analytics.html' },
                    { icon:'fas fa-history', text:'Activity Logs', page:'activity-logs.html' },
                    { icon:'fas fa-bell', text:'Notifications', page:'notifications.html' }
                ], 
                manager: [
                    { icon:'fas fa-tachometer-alt', text:'Dashboard', page:'employee-dashboard.html' },
                    { icon:'fas fa-users', text:'Team', page:'employee-management.html' },
                    { icon:'fas fa-project-diagram', text:'Projects', page:'project-management.html' },
                    { icon:'fas fa-tasks', text:'Tasks', page:'task-management.html' },
                    { icon:'fas fa-calendar-check', text:'Attendance', page:'attendance.html' }
                ], 
                employee: [
                    { icon:'fas fa-tachometer-alt', text:'Dashboard', page:'employee-dashboard.html' },
                    { icon:'fas fa-tasks', text:'My Tasks', page:'task-management.html' },
                    { icon:'fas fa-clock', text:'Attendance', page:'attendance.html' },
                    { icon:'fas fa-calendar-alt', text:'Apply Leave', page:'leave-management.html' },
                    { icon:'fas fa-user', text:'Profile', page:'profile.html' }
                ] 
            };
            
            const items = menu[role] || menu.employee;
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = items.map(item => `<a href="#" class="nav-link" data-page="${item.page}"><i class="${item.icon} me-2"></i>${item.text}</a>`).join('');
            
            document.querySelectorAll('[data-page]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadPageContent(link.dataset.page);
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    if (window.innerWidth < 768) {
                        document.getElementById('sidebar').classList.remove('show');
                    }
                });
            });
        }
        
        async function loadPageContent(page = null) {
            const pageName = page || (window.location.hash.slice(1) || (localStorage.getItem('role') === 'admin' ? 'admin-dashboard.html' : 'employee-dashboard.html'));
            try {
                const res = await fetch(pageName);
                const html = await res.text();
                document.getElementById('pageContent').innerHTML = html;
                window.location.hash = pageName;
                const scripts = document.querySelectorAll('#pageContent script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            } catch (error) {
                document.getElementById('pageContent').innerHTML = '<div class="alert alert-danger">Page not found</div>';
            }
        }
        
        document.getElementById('menuToggle')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('show');
        });
        
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
        
        init();
        window.loadPageContent = loadPageContent;
        window.logout = logout;
    </script>
</body>
</html>
